name: FastAPI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit pip-audit pytest

    # 1. OWASP Dependency Check (SCA)
    - name: Dependency Security Check (pip-audit)
      run: pip-audit

    # 2. SAST - Статический анализ кода (Bandit)
    - name: Static Analysis Security Test (Bandit)
      run: bandit -r . -x ./tests -f txt

    # 3. Запуск тестов
    - name: Run Unit Tests
      run: pytest

  build-and-push:
    needs: security-and-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Здесь может быть логика сборки Docker и пуша в Registry
    - name: Build Docker Image
      run: |
        docker build -t my-fastapi-app:${{ github.sha }} .